<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel | VaultUnlocked</title>
  <link rel="stylesheet" href="/public/css/style.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">VaultUnlocked - Admin</div>
    <nav>
      <a href="/">Inicio</a>
      <button id="logout-button" class="link-button">Cerrar sesión</button>
    </nav>
  </header>
  <main class="container">
    <section style="margin-bottom: 3rem;">
      <h1 style="color: #60a5fa; margin-top: 0;">🔧 Panel de Administración</h1>
    </section>
    <section class="admin-grid" style="grid-template-columns: 1fr 1fr;">
      <div class="card card-panel">
        <h2 style="margin-top: 0; color: #60a5fa;">👥 Usuarios</h2>
        <div id="users-list" style="max-height: 600px; overflow-y: auto;"></div>
      </div>
      <div class="card card-panel">
        <h2 style="margin-top: 0; color: #60a5fa;">📦 Recursos</h2>
        <div id="resources-admin-list" style="max-height: 600px; overflow-y: auto;"></div>
      </div>
    </section>
  </main>
  <script src="/public/js/admin.js"></script>
</body>
</html>
