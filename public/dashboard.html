<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Panel | VaultUnlocked</title>
  <link rel="stylesheet" href="/public/css/style.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">VaultUnlocked</div>
    <nav>
      <a href="/">Inicio</a>
      <button id="logout-button" class="link-button">Cerrar sesión</button>
    </nav>
  </header>
  <main class="container">
    <section style="margin-bottom: 3rem;">
      <h1 style="color: #60a5fa; margin-top: 0;">Mi Panel de Control</h1>
    </section>
    <section class="dashboard-grid" style="grid-template-columns: 1fr 1fr;">
      <div class="card card-panel">
        <h2 style="margin-top: 0; color: #60a5fa;">Subir Recurso</h2>
        <form id="upload-form" enctype="multipart/form-data">
          <label style="color: #cbd5e1; margin-top: 1rem; display: block;">Título</label>
          <input type="text" name="title" placeholder="Nombre del recurso" required>
          <label style="color: #cbd5e1; margin-top: 1rem; display: block;">Descripción</label>
          <textarea name="description" rows="4" placeholder="Describe tu recurso..." required></textarea>
          <label style="color: #cbd5e1; margin-top: 1rem; display: block;">Categoría</label>
          <select name="category" required>
            <option value="">Selecciona una categoría</option>
            <option value="plugins">Plugins</option>
            <option value="mods">Mods</option>
            <option value="assets">Assets</option>
            <option value="scripts">Scripts</option>
            <option value="texturas">Texturas</option>
            <option value="mapas">Mapas</option>
            <option value="utilidades">Utilidades</option>
          </select>
          <label style="color: #cbd5e1; margin-top: 1rem; display: block;">Archivo (máx 100MB)</label>
          <input type="file" name="file" required>
          <button type="submit" style="width: 100%; margin-top: 1.5rem;">Subir Recurso</button>
        </form>
        <p id="upload-message" class="message" style="display: none;"></p>
      </div>
      <div class="card card-panel">
        <h2 style="margin-top: 0; color: #60a5fa;">📚 Tus Recursos</h2>
        <div id="my-resources" style="max-height: 500px; overflow-y: auto;"></div>
      </div>
    </section>
  </main>
  <script src="/public/js/app.js"></script>
</body>
</html>
