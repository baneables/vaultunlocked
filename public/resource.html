<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recurso | VaultUnlocked</title>
  <link rel="stylesheet" href="/public/css/style.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">VaultUnlocked</div>
    <nav>
      <a href="/">Inicio</a>
      <a href="#" id="nav-dashboard-btn" style="display:none;">Mi panel</a>
    </nav>
  </header>
  <main class="container">
    <section class="resource-detail card" style="max-width: 800px; margin: 2rem auto;">
      <div id="resource-info" style="min-height: 200px;"></div>
      <div class="comments-section">
        <h3 style="margin-top: 0;">💬 Comentarios</h3>
        <form id="comment-form" style="margin-bottom: 2rem;">
          <textarea name="text" rows="3" placeholder="Escribe tu comentario..." required></textarea>
          <button type="submit" style="margin-top: 1rem;">Comentar</button>
        </form>
        <div id="comments-list"></div>
      </div>
    </section>
  </main>
  <script src="/public/js/resource.js"></script>
